name: LAP Push Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call push monitor
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.LAP_CRON_SECRET }}" \
            "https://lap-live-sports.vercel.app/api/push/monitor"
