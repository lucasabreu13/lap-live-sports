name: LAP Push Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: lap-live-push-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check live events every minute
        env:
          CRON_SECRET: ${{ secrets.LAP_CRON_SECRET }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Live check ${attempt}/5"
            curl --fail-with-body --show-error --silent \
              --retry 2 --retry-delay 3 --retry-all-errors --max-time 90 \
              --request POST \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              "https://lap-live-sports.vercel.app/api/push/monitor"
            echo
            if [ "${attempt}" -lt 5 ]; then sleep 55; fi
          done
