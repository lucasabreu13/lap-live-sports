name: LAP Newsroom AI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/newsroom-ai.yml"
      - "scripts/newsroom-agents.mjs"
      - "scripts/newsroom-data-stories.mjs"
      - "scripts/newsroom-editorial-polish.mjs"
      - "scripts/newsroom-maintenance.mjs"
      - "scripts/newsroom-curated-merge.mjs"
      - "content/newsroom/curated-articles.json"
      - "content/newsroom/editorial-overrides.json"
      - "content/editorial/reader-terms.json"
      - "lib/newsroom-content.ts"
      - "lib/reader-clarity.ts"
      - "lib/lap-news-mode.ts"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: lap-newsroom-ai
  cancel-in-progress: false

jobs:
  newsroom:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run specialist news agents and editor-in-chief
        id: agents
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEWSROOM_MODEL: openai/gpt-4o
          LAP_SITE_URL: https://lap-live-sports.vercel.app
        run: node scripts/newsroom-agents.mjs

      - name: Publish original stories from verified sports data
        id: data_stories
        continue-on-error: true
        env:
          LAP_SITE_URL: https://lap-live-sports.vercel.app
        run: node scripts/newsroom-data-stories.mjs

      - name: Polish stories with specialist editorial desks
        id: editorial_polish
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEWSROOM_MODEL: openai/gpt-4o
        run: node scripts/newsroom-editorial-polish.mjs

      - name: Consolidate living stories and remove invalid content
        id: maintenance
        continue-on-error: true
        run: node scripts/newsroom-maintenance.mjs

      - name: Ensure verified curated stories stay in the public archive
        id: curated_merge
        continue-on-error: true
        run: node scripts/newsroom-curated-merge.mjs

      - name: Record pipeline validation and coverage health
        if: always()
        env:
          AGENTS_OUTCOME: ${{ steps.agents.outcome }}
          DATA_STORIES_OUTCOME: ${{ steps.data_stories.outcome }}
          EDITORIAL_POLISH_OUTCOME: ${{ steps.editorial_polish.outcome }}
          MAINTENANCE_OUTCOME: ${{ steps.maintenance.outcome }}
          CURATED_MERGE_OUTCOME: ${{ steps.curated_merge.outcome }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const stages = {
            agents: process.env.AGENTS_OUTCOME || 'unknown',
            dataStories: process.env.DATA_STORIES_OUTCOME || 'unknown',
            editorialPolish: process.env.EDITORIAL_POLISH_OUTCOME || 'unknown',
            maintenance: process.env.MAINTENANCE_OUTCOME || 'unknown',
            curatedMerge: process.env.CURATED_MERGE_OUTCOME || 'unknown',
          };
          const sourceErrors = Object.entries(stages).filter(([, value]) => value !== 'success').map(([stage, outcome]) => ({ stage, outcome }));
          const status = sourceErrors.length ? 'degraded' : 'ok';
          const readArticles = (text) => {
            try { const parsed = JSON.parse(text); return Array.isArray(parsed) ? parsed : []; } catch { return []; }
          };
          const current = readArticles(fs.readFileSync('content/newsroom/articles.json', 'utf8'));
          const curated = fs.existsSync('content/newsroom/curated-articles.json')
            ? readArticles(fs.readFileSync('content/newsroom/curated-articles.json', 'utf8'))
            : [];
          const overrides = fs.existsSync('content/newsroom/editorial-overrides.json')
            ? readArticles(fs.readFileSync('content/newsroom/editorial-overrides.json', 'utf8'))
            : [];
          let previous = [];
          try { previous = readArticles(execFileSync('git', ['show', 'HEAD:content/newsroom/articles.json'], { encoding: 'utf8' })); } catch {}
          const previousById = new Map(previous.map((article) => [article.id || article.slug, article]));
          const currentById = new Map(current.map((article) => [article.id || article.slug, article]));
          const created = current.filter((article) => !previousById.has(article.id || article.slug));
          const updated = current.filter((article) => {
            const before = previousById.get(article.id || article.slug);
            return Boolean(before && (before.updatedAt !== article.updatedAt || before.content !== article.content || before.title !== article.title));
          });
          const removed = previous.filter((article) => !currentById.has(article.id || article.slug));
          const byPublishedAt = [...current].filter((article) => article.publishedAt || article.createdAt).sort((a, b) => new Date(b.publishedAt || b.createdAt).getTime() - new Date(a.publishedAt || a.createdAt).getTime());
          const activeSports = ['futebol', 'futebol-americano', 'tenis', 'ciclismo', 'formula1', 'basquete', 'beisebol', 'golfe', 'surfe'];
          const lastPublishedBySport = Object.fromEntries(activeSports.map((sportId) => {
            const article = byPublishedAt.find((item) => item.sportId === sportId);
            return [sportId, article?.publishedAt || article?.createdAt || null];
          }));
          const now = Date.now();
          const warningAfterHours = 12;
          const criticalAfterHours = 24;
          const freshnessBySport = Object.fromEntries(activeSports.map((sportId) => {
            const publishedAt = lastPublishedBySport[sportId];
            if (!publishedAt) return [sportId, { status: 'critical', ageHours: null, lastPublishedAt: null }];
            const ageHours = Math.max(0, (now - new Date(publishedAt).getTime()) / 3600000);
            const freshness = ageHours > criticalAfterHours ? 'critical' : ageHours > warningAfterHours ? 'warning' : 'ok';
            return [sportId, { status: freshness, ageHours: Number(ageHours.toFixed(1)), lastPublishedAt: publishedAt }];
          }));
          const freshnessValues = Object.values(freshnessBySport).map((item) => item.status);
          const coverageStatus = freshnessValues.includes('critical') ? 'critical' : freshnessValues.includes('warning') ? 'warning' : 'ok';
          const payload = {
            status,
            coverageStatus,
            validatedAt: new Date().toISOString(),
            commit: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            event: process.env.GITHUB_EVENT_NAME,
            stages,
            metrics: {
              articlesCreated: created.length,
              articlesUpdated: updated.length,
              articlesRemoved: removed.length,
              articlesRejected: null,
              curatedArticles: curated.length,
              editorialOverrides: overrides.length,
              lastPublishedAt: byPublishedAt[0]?.publishedAt || byPublishedAt[0]?.createdAt || null,
              lastPublishedBySport,
              sourceErrors,
              freshnessSLA: { warningAfterHours, criticalAfterHours, bySport: freshnessBySport },
            },
            metricNotes: {
              articlesRejected: 'Rejeições editoriais ainda não são persistidas pelos estágios; null evita reportar zero sem evidência.',
              curatedArticles: 'Matérias verificadas e preservadas fora da geração automática para não serem removidas nas rodadas do Newsroom.',
              editorialOverrides: 'Revisões editoriais explícitas aplicadas sobre matérias já publicadas, inclusive para clareza de termos técnicos.',
            },
          };
          fs.writeFileSync('content/newsroom/status.json', `${JSON.stringify(payload, null, 2)}\n`);
          console.log(JSON.stringify(payload));
          NODE

      - name: Publish newsroom content to repository
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- content/newsroom/articles.json content/newsroom/status.json)" ]; then
            echo "No newsroom changes to publish."
            exit 0
          fi
          git config user.name "lap-newsroom[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/newsroom/articles.json content/newsroom/status.json
          git commit -m "chore(newsroom): publish verified sports stories and pipeline status"
          git pull --rebase origin main
          git push
