name: Live push monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: live-push-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Refresh live events and deliver alerts
        env:
          CRON_SECRET: ${{ secrets.LAP_CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 2 --retry-delay 5 --max-time 90 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -X POST \
            https://lap-live-sports.vercel.app/api/push/monitor
